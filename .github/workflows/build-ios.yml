name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create iOS-only project spec
        working-directory: ios/ClaudeWatch
        run: |
          cat > project-ios-only.yml << 'SPEC'
          name: ClaudeWatch
          options:
            bundleIdPrefix: com.shobhit.claudewatch
            deploymentTarget:
              iOS: "17.0"
            createIntermediateGroups: true
          settings:
            base:
              SWIFT_VERSION: "5.9"
          targets:
            ClaudeWatch:
              type: application
              platform: iOS
              sources:
                - path: "ClaudeWatch iOS"
                - path: Shared
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.shobhit.claudewatch
                  INFOPLIST_FILE: "ClaudeWatch iOS/Info.plist"
                  PRODUCT_NAME: Agent Watch
                  GENERATE_INFOPLIST_FILE: false
          schemes:
            ClaudeWatch:
              build:
                targets:
                  ClaudeWatch: all
              run:
                config: Debug
          SPEC
          echo "=== project-ios-only.yml ==="
          cat project-ios-only.yml

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: |
          xcodegen generate --spec project-ios-only.yml
          echo "=== Targets ==="
          xcodebuild -project ClaudeWatch.xcodeproj -list

      - name: Build iOS app
        working-directory: ios/ClaudeWatch
        run: |
          set +e
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -scheme ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build \
            2>&1 | tee build-full.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="
          echo ""
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== ERRORS (last 100 lines) ==="
            tail -100 build-full.log
            echo ""
            echo "=== GREP for error/Error ==="
            grep -i "error" build-full.log | tail -30
          fi
          exit $BUILD_EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/ClaudeWatch/build-full.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Package IPA
        working-directory: ios/ClaudeWatch
        run: |
          APP=$(find ./build -name "*.app" -type d | head -1)
          echo "App: $APP"
          du -sh "$APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r AgentWatch.ipa Payload
          ls -lh AgentWatch.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch
          path: ios/ClaudeWatch/AgentWatch.ipa
          retention-days: 30
