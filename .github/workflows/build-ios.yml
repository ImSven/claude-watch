name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/ClaudeWatch
        run: |
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -scheme ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build \
            2>&1 | tail -30

      - name: List build products
        if: always()
        continue-on-error: true
        working-directory: ios/ClaudeWatch
        run: |
          echo "=== .app bundles and sizes ==="
          find ./build/Build/Products -name "*.app" -type d -print0 2>/dev/null \
            | xargs -0 -I{} du -sh "{}" 2>/dev/null || true

      - name: Package IPA
        working-directory: ios/ClaudeWatch
        run: |
          PRODUCTS="./build/Build/Products"

          # Try the expected path first
          if [ -d "$PRODUCTS/Release-iphoneos/Agent Watch.app" ]; then
            APP_PATH="$PRODUCTS/Release-iphoneos/Agent Watch.app"
          else
            # Fallback: find the largest top-level .app
            APP_PATH=$(find "$PRODUCTS" -maxdepth 2 -name "*.app" -type d -print0 2>/dev/null \
              | xargs -0 -I{} sh -c 'echo "$(du -s "{}" | cut -f1)|{}"' \
              | sort -t'|' -k1 -rn \
              | head -1 \
              | cut -d'|' -f2)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found"
            find "$PRODUCTS" -type d -maxdepth 3 2>/dev/null || true
            exit 1
          fi

          echo "App: $APP_PATH"
          du -sh "$APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AgentWatch-unsigned.ipa Payload
          echo "=== IPA ==="
          ls -lh AgentWatch-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch-unsigned
          path: ios/ClaudeWatch/AgentWatch-unsigned.ipa
          retention-days: 30
