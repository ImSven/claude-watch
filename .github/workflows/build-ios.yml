name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create iOS-only project spec
        working-directory: ios/ClaudeWatch
        run: |
          cat > project-ios-only.yml << 'SPEC'
          name: ClaudeWatch
          options:
            bundleIdPrefix: com.shobhit.claudewatch
            deploymentTarget:
              iOS: "17.0"
            createIntermediateGroups: true

          settings:
            base:
              SWIFT_VERSION: "5.9"

          targets:
            ClaudeWatch:
              type: application
              platform: iOS
              sources:
                - path: "ClaudeWatch iOS"
                - path: Shared
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.shobhit.claudewatch
                  INFOPLIST_FILE: "ClaudeWatch iOS/Info.plist"
                  PRODUCT_NAME: Agent Watch
                  GENERATE_INFOPLIST_FILE: false

          schemes:
            ClaudeWatch:
              build:
                targets:
                  ClaudeWatch: all
              run:
                config: Debug
          SPEC

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate --spec project-ios-only.yml

      - name: Build and package IPA
        working-directory: ios/ClaudeWatch
        run: |
          set -euo pipefail

          echo ">>> Building iOS app..."
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -target ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build \
            2>&1 | tail -5

          echo ""
          echo ">>> Looking for .app..."
          find ./build/Build/Products -name "*.app" -type d

          APP=$(find ./build/Build/Products -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: no .app found"
            find ./build -type d | head -40
            exit 1
          fi

          echo ">>> App: $APP"
          du -sh "$APP"

          mkdir Payload
          cp -r "$APP" Payload/
          zip -r AgentWatch.ipa Payload
          echo ">>> IPA:"
          ls -lh AgentWatch.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch
          path: ios/ClaudeWatch/AgentWatch.ipa
          retention-days: 30
