name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Remove watchOS dependency (iPhone-only build)
        working-directory: ios/ClaudeWatch
        run: |
          python3 -c "
          import yaml
          with open('project.yml') as f:
              data = yaml.safe_load(f)
          # Remove watchOS target dependency from iOS target
          if 'ClaudeWatch' in data.get('targets', {}):
              data['targets']['ClaudeWatch'].pop('dependencies', None)
          # Remove watchOS target entirely
          data['targets'].pop('ClaudeWatchWatch', None)
          # Remove watchOS scheme
          data.get('schemes', {}).pop('ClaudeWatchWatch', None)
          with open('project.yml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True)
          print('Removed watchOS target and dependencies')
          " || {
            # Fallback if pyyaml not available: use sed
            sed -i '' '/^  ClaudeWatchWatch:/,/^  [A-Z]/{ /^  [A-Z]/!d; }' project.yml
            sed -i '' '/dependencies:/,/embed: true/d' project.yml
            echo "Removed watchOS via sed fallback"
          }
          echo "=== Modified project.yml ==="
          cat project.yml

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate

      - name: Build and package IPA
        working-directory: ios/ClaudeWatch
        run: |
          set -euo pipefail

          echo ">>> Building..."
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -target ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build \
            2>&1 | tail -5

          echo ""
          echo ">>> Build products:"
          find ./build/Build/Products -name "*.app" -type d
          echo ""

          # Find the .app
          APP=$(find ./build/Build/Products -name "*.app" -type d | head -1)
          echo ">>> Using: $APP"
          du -sh "$APP"

          # Create IPA
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r AgentWatch.ipa Payload
          echo ""
          echo ">>> IPA ready:"
          ls -lh AgentWatch.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch
          path: ios/ClaudeWatch/AgentWatch.ipa
          retention-days: 30
