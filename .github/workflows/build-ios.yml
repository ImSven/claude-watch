name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate

      - name: Build iOS app (ad-hoc signed)
        working-directory: ios/ClaudeWatch
        run: |
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -scheme ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build \
            2>&1 | tail -30

      - name: Debug build output
        if: always()
        working-directory: ios/ClaudeWatch
        run: |
          echo "=== All .app bundles ==="
          find ./build -name "*.app" -type d 2>/dev/null
          echo ""
          echo "=== Release-iphoneos contents ==="
          ls -la ./build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "Release-iphoneos not found"
          echo ""
          echo "=== All Products dirs ==="
          find ./build/Build/Products -maxdepth 1 -type d 2>/dev/null
          echo ""
          echo "=== App bundle sizes ==="
          find ./build -name "*.app" -type d -exec du -sh {} \; 2>/dev/null

      - name: Package IPA
        working-directory: ios/ClaudeWatch
        run: |
          # Find the iOS .app (largest one, skip watchOS sub-app)
          APP_PATH=$(find ./build/Build/Products -maxdepth 2 -name "*.app" -type d \
            | while read p; do
                # Skip paths inside another .app (embedded watchOS)
                case "$p" in *".app/"*) continue ;; esac
                echo "$(du -s "$p" | cut -f1) $p"
              done \
            | sort -rn | head -1 | cut -d' ' -f2-)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found"
            find ./build -type d -name "*.app" 2>/dev/null
            exit 1
          fi

          echo "Using app: $APP_PATH"
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
          ls -la "$APP_PATH/"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AgentWatch-unsigned.ipa Payload
          echo "IPA size: $(du -h AgentWatch-unsigned.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch-unsigned
          path: ios/ClaudeWatch/AgentWatch-unsigned.ipa
          retention-days: 30
