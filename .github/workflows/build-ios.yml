name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create iOS-only project spec
        working-directory: ios/ClaudeWatch
        run: |
          cat > project-ios-only.yml << 'SPEC'
          name: ClaudeWatch
          options:
            bundleIdPrefix: com.shobhit.claudewatch
            deploymentTarget:
              iOS: "17.0"
            createIntermediateGroups: true
          settings:
            base:
              SWIFT_VERSION: "5.9"
          targets:
            ClaudeWatch:
              type: application
              platform: iOS
              sources:
                - path: "ClaudeWatch iOS"
                - path: Shared
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.shobhit.claudewatch
                  INFOPLIST_FILE: "ClaudeWatch iOS/Info.plist"
                  PRODUCT_NAME: Agent Watch
                  GENERATE_INFOPLIST_FILE: false
          schemes:
            ClaudeWatch:
              build:
                targets:
                  ClaudeWatch: all
              run:
                config: Debug
          SPEC

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate --spec project-ios-only.yml

      - name: Build iOS app
        working-directory: ios/ClaudeWatch
        run: |
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -target ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build

      - name: Package IPA
        working-directory: ios/ClaudeWatch
        run: |
          set -x

          echo "=== Full build tree (dirs only) ==="
          find ./build -type d 2>/dev/null | head -60

          echo "=== All .app bundles ==="
          find ./build -name "*.app" -type d 2>/dev/null

          echo "=== All files over 1MB ==="
          find ./build -type f -size +1M 2>/dev/null | head -20

          # Find any .app bundle
          APP="$(find ./build -name "*.app" -type d 2>/dev/null | head -1)"

          if [ -z "$APP" ]; then
            echo "No .app found! Listing all build output..."
            find ./build -type f 2>/dev/null | head -100
            exit 1
          fi

          echo "Found app: $APP"
          du -sh "$APP"
          ls "$APP/"

          mkdir Payload
          cp -r "$APP" Payload/
          zip -r AgentWatch.ipa Payload
          ls -lh AgentWatch.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch
          path: ios/ClaudeWatch/AgentWatch.ipa
          retention-days: 30

      - name: Upload build tree listing on failure
        if: failure()
        working-directory: ios/ClaudeWatch
        run: find ./build -type f 2>/dev/null > build-tree.txt || true

      - name: Upload build tree
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-tree
          path: ios/ClaudeWatch/build-tree.txt
          retention-days: 7
          if-no-files-found: ignore
