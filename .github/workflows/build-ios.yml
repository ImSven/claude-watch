name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/ClaudeWatch
        run: |
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -scheme ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CONFIGURATION_BUILD_DIR="$(pwd)/output" \
            2>&1 | tail -30

      - name: Package IPA
        working-directory: ios/ClaudeWatch
        run: |
          echo "=== output directory ==="
          ls -lah output/ || true
          echo ""
          echo "=== all .app bundles ==="
          find output -name "*.app" -type d || true
          echo ""

          mkdir -p Payload
          # Copy the .app — try known name first, then fallback
          if [ -d "output/Agent Watch.app" ]; then
            cp -r "output/Agent Watch.app" Payload/
          elif [ -d "output/AgentWatch.app" ]; then
            cp -r "output/AgentWatch.app" Payload/
          else
            # Last resort: grab first .app that is NOT inside another .app
            FOUND=$(find output -name "*.app" -type d | grep -v "\.app/" | head -1)
            if [ -z "$FOUND" ]; then
              echo "ERROR: no .app found anywhere in output/"
              find output -type f | head -30
              exit 1
            fi
            echo "Using fallback app: $FOUND"
            cp -r "$FOUND" Payload/
          fi

          echo "=== Payload contents ==="
          ls -lah Payload/
          du -sh Payload/*.app

          zip -r AgentWatch.ipa Payload
          ls -lh AgentWatch.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch
          path: ios/ClaudeWatch/AgentWatch.ipa
          retention-days: 30
