name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/ClaudeWatch
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/ClaudeWatch
        run: |
          xcodebuild build \
            -project ClaudeWatch.xcodeproj \
            -scheme ClaudeWatch \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath ./build \
            2>&1 | tail -30

      - name: Debug build output
        if: always()
        continue-on-error: true
        working-directory: ios/ClaudeWatch
        run: |
          echo "=== All .app bundles ==="
          find ./build -name "*.app" -type d 2>/dev/null || true
          echo ""
          echo "=== Products directories ==="
          find ./build/Build/Products -maxdepth 1 -type d 2>/dev/null || true
          echo ""
          echo "=== App bundle sizes ==="
          find ./build -name "*.app" -type d -exec du -sh {} \; 2>/dev/null || true

      - name: Package IPA
        working-directory: ios/ClaudeWatch
        run: |
          # Find the top-level iOS .app (skip watchOS sub-apps nested inside another .app)
          APP_PATH=""
          while IFS= read -r p; do
            case "$p" in *".app/"*) continue ;; esac
            APP_PATH="$p"
            break
          done < <(find ./build/Build/Products -maxdepth 2 -name "*.app" -type d 2>/dev/null \
            | while read -r d; do echo "$(du -s "$d" 2>/dev/null | cut -f1) $d"; done \
            | sort -rn | sed 's/^[0-9]* //')

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build products"
            echo "=== Full build products tree ==="
            find ./build/Build/Products -type d 2>/dev/null || true
            exit 1
          fi

          echo "Using app: $APP_PATH"
          du -sh "$APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AgentWatch-unsigned.ipa Payload
          echo "=== Final IPA ==="
          ls -lh AgentWatch-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentWatch-unsigned
          path: ios/ClaudeWatch/AgentWatch-unsigned.ipa
          retention-days: 30
